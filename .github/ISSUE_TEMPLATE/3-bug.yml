name: 🐛 Bug
description: Report a bug
title: "[Bug] "
type: Bug
body:
  - type: textarea
    attributes:
      label: 📝 Description
      description: |
        Provide a clear and concise description of the bug.  
        Include screenshots, screen recordings, logs, or error messages if applicable.  
        For large text blocks, please use https://gist.github.com or https://pastebin.com.
    validations:
      required: true
  - type: input
    attributes:
      label: Operating system and version
      placeholder: "Enter 'none' if not applicable."
    validations:
      required: false
  - type: input
    attributes:
      label: Programming language and version
      placeholder: "Enter 'none' if not applicable."
    validations:
      required: false
  - type: input
    attributes:
      label: Dependencies and versions
      placeholder: "Enter 'none' if not applicable."
    validations:
      required: false
  - type: textarea
    attributes:
      label: 🔁 Steps to Reproduce
      description: |
        Explain how to reproduce this issue.
      value: "1. "
    validations:
      required: true
  - type: textarea
    attributes:
      label: ✅ Expected behavior
      description: |
        What did you expect to happen?
    validations:
      required: true
  - type: textarea
    attributes:
      label: ❌ Actual behavior
      description: |
        What happened instead?
    validations:
      required: true
  - type: textarea
    attributes:
      label: 💬 Additional information
      description: |
        Add any other context that may help us understand the issue.
    validations:
      required: false
  - type: checkboxes
    attributes:
      label: 📋 Checklist
      description: |
        Thanks for taking the time to report the bug!  
        Before submitting, please make sure you have done the following:
      options:
        - label: I have searched existing issues and confirm that this is not a duplicate.
          required: true
        - label: I have read the [Contributing Guidelines](https://katorly.com/docs/contribute/contributing) and [Code of Conduct](https://katorly.com/docs/contribute/code-of-conduct).
          required: true
        - label: This is not a security vulnerability report. If it is, please follow our [Security Policy](https://katorly.com/docs/contribute/security).
          required: true